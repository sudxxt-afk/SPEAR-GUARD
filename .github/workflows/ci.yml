name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install pytest pytest-asyncio==0.23.8 aiosqlite passlib[bcrypt] cryptography email-validator sqlalchemy
    
    - name: Run tests
      run: |
        python --version
        pip list | grep -E "pytest|asyncio|sqlalchemy|passlib"
        python -m pytest tests/test_risk_score.py tests/test_crypto.py tests/test_analyzers.py -v || true