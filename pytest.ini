[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Output
addopts = -v --tb=short

# Ignore patterns
norecursedirs = 
    .git
    .venv
    venv
    node_modules
    __pycache__

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take longer to run
    db: Tests requiring database
    api: Tests requiring API client